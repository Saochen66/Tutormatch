{% extends "base.html" %}
{% block title %}注册 - 家教服务系统{% endblock %}
{% block content %}
<div class="card">
    <div class="hero" style="padding: 0 0 20px 0;">
        <h1>注册账号</h1>
        <p class="subtitle">加入家教服务系统</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label>选择您的身份</label>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="role" value="tutor" {% if role=='tutor' %}checked{% endif %}>
                    <span>👨‍🏫 我是家教</span>
                </label>
                <label class="radio-item">
                    <input type="radio" name="role" value="student" {% if role=='student' %}checked{% endif %}>
                    <span>🎓 我是学生/家长</span>
                </label>
            </div>
        </div>
        <div class="form-group">
            <label>昵称</label>
            <input type="text" name="nickname" value="{{ nickname or '' }}" placeholder="请输入昵称" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="至少8位" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" name="confirm_password" placeholder="请再次输入密码" required>
        </div>
        <div class="btn-group">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">立即注册</button>
        </div>
        <p style="text-align: center; margin-top: 20px; color: var(--gray-500);">
            已有账号? <a href="{{ url_for('login') }}" class="link">立即登录</a>
        </p>
    </form>
</div>
{% endblock %}
