{% extends "base.html" %}
{% block title %}登录 - 家教服务系统{% endblock %}
{% block content %}
<div class="card">
    <div class="hero" style="padding: 0 0 20px 0;">
        <h1>登录</h1>
        <p class="subtitle">欢迎回来</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label>昵称</label>
            <input type="text" name="nickname" value="{{ nickname or '' }}" placeholder="请输入昵称" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="btn-group">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">登录</button>
        </div>
        <p style="text-align: center; margin-top: 20px; color: var(--gray-500);">
            没有账号? <a href="{{ url_for('register') }}" class="link">立即注册</a>
        </p>
    </form>
</div>
{% endblock %}
