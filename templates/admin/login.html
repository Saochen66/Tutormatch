{% extends "base.html" %}
{% block title %}管理员登录 - 家教服务系统{% endblock %}
{% block content %}
<div class="card">
    <div class="hero" style="padding: 0 0 20px 0;">
        <h1>管理员登录</h1>
        <p class="subtitle">后台管理系统</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" value="{{ username or '' }}" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="btn-group">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">登录</button>
        </div>
    </form>
</div>
{% endblock %}
